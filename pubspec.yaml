name: bioliminal
description: "Clinical-grade movement screening and real-time sEMG biofeedback."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  camera: ^0.12.0+1
  google_mlkit_pose_detection: ^0.14.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  pdf: ^3.10.0
  share_plus: ^13.0.0
  path_provider: ^2.1.0
  app_settings: ^7.0.0
  http: ^1.2.0
  flutter_blue_plus: ^1.34.5
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/reference_images/
    - assets/models/
    - assets/premium/
    - assets/branding/
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
        - asset: assets/fonts/Fraunces-Italic-Variable.ttf
          style: italic
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Variable.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
