<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Bioliminal app icon 1024×1024 master.
       Renders to iOS AppIcon / Android legacy launcher / Web PWA icons. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#050812"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Mark: 120-unit original centered at (60, 55), scaled 10× to fill safe area. -->
  <g transform="translate(512, 512) scale(10) translate(-60, -55)" stroke="#E6EEFB">
    <line x1="42" y1="18" x2="42" y2="92" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="74" r="18" stroke-width="3"/>
    <path d="M44 76 Q 52 62, 60 74 T 76 72" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="44" cy="76" r="2" fill="#E6EEFB" stroke="none"/>
    <circle cx="60" cy="74" r="2" fill="#E6EEFB" stroke="none"/>
    <circle cx="76" cy="72" r="2" fill="#E6EEFB" stroke="none"/>
  </g>
</svg>
